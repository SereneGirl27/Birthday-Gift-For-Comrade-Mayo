<!DOCTYPE html>
<html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Photos</title>
<style>
html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#10285a,#040814 70%);font-family:Georgia,serif;overflow-x:hidden}
.star{position:fixed;width:2px;height:2px;background:#fff;border-radius:50%;opacity:.25;animation:tw var(--d) ease-in-out infinite}
@keyframes tw{50%{opacity:1;transform:scale(1.7)}}
.container{max-width:980px;margin:0 auto;padding:70px 20px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:28px}
.card{height:280px;border-radius:22px;overflow:hidden;background:rgba(255,255,255,.05);
border:2px solid rgba(190,220,255,.6);
box-shadow:0 0 18px rgba(170,210,255,.25),0 0 45px rgba(120,170,255,.15);
transition:.35s}
.card:hover{transform:translateY(-6px) scale(1.02);
box-shadow:0 0 28px rgba(210,235,255,.5),0 0 70px rgba(140,190,255,.28)}
.card img{width:100%;height:100%;object-fit:cover}
.btnwrap{text-align:center;margin:55px 0 20px}
button{padding:15px 34px;border:none;border-radius:40px;background:rgba(30,80,170,.8);color:#fff;
font-size:17px;cursor:pointer;box-shadow:0 0 15px rgba(170,210,255,.35)}
button:hover{background:#2b6fe0;box-shadow:0 0 28px rgba(180,220,255,.6)}
@media(max-width:760px){.grid{grid-template-columns:1fr}.card{height:240px}}
</style></head><body>
<div class='container'>
<div class='grid'>
<div class='card'><img src='images/photo1.jpg' alt='Photo 1'></div>
<div class='card'><img src='images/photo2.jpg' alt='Photo 2'></div>
<div class='card'><img src='images/photo3.jpg' alt='Photo 3'></div>
<div class='card'><img src='images/photo4.jpg' alt='Photo 4'></div>
</div>
<div class='btnwrap'>
<button onclick="location.href='reasons.html'">✨ Reasons Why You're Awesome →</button>
</div>
</div>
<script>
for(let i=0;i<170;i++){
let s=document.createElement('div');
s.className='star';
s.style.left=Math.random()*100+'vw';
s.style.top=Math.random()*100+'vh';
let z=Math.random()*2+1;
s.style.width=z+'px';s.style.height=z+'px';
s.style.setProperty('--d',(2+Math.random()*5)+'s');
document.body.appendChild(s);}
</script>
</body></html>
